services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./eval:/app/../eval
      - hf_cache:/root/.cache/huggingface
    environment:
      - QDRANT_HOST=qdrant

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  ingest:
    build: ./backend
    profiles:
      - setup
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - hf_cache:/root/.cache/huggingface
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
    command: ["uv", "run", "python", "-m", "scripts.ingest"]

volumes:
  qdrant_storage:
  hf_cache:
